# BookFilm Studio — Secured Redis configuration
# Used when running Redis locally via Docker (not needed for Upstash)

# ── Authentication ──────────────────────────────────────────────────────────
requirepass CHANGE_THIS_REDIS_PASSWORD

# ── Network — bind only to internal Docker network (never expose externally) ─
bind 0.0.0.0
protected-mode yes

# ── Disable dangerous commands (rename to empty string = disable) ────────────
rename-command FLUSHALL   ""
rename-command FLUSHDB    ""
rename-command CONFIG     ""
rename-command DEBUG      ""
rename-command SLAVEOF    ""
rename-command REPLICAOF  ""
rename-command SHUTDOWN   SHUTDOWN_BOOKFILM

# ── Memory management ────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence ──────────────────────────────────────────────────────────────
save 900 1
save 300 10
save 60  10000
appendonly yes
appendfsync everysec

# ── Logging ──────────────────────────────────────────────────────────────────
loglevel notice

# ── Limits ───────────────────────────────────────────────────────────────────
maxclients 100
tcp-keepalive 300
timeout 300
