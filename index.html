<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookFilm Studio</title>

    <!-- Primary meta -->
    <meta name="description" content="Turn any book into a complete 7-episode cinematic AI video series — characters, scenes, dialogue, images, video and voice, all generated for you." />
    <meta name="theme-color" content="#080b10" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="BookFilm Studio" />
    <meta property="og:title"       content="BookFilm Studio — Turn any book into a cinematic AI series" />
    <meta property="og:description" content="From book text to a full 7-episode cinematic production: characters, storyboards, AI-generated images, video and voice. Your book, on screen." />
    <meta property="og:image"       content="/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="BookFilm Studio — cinematic AI video series generator" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="BookFilm Studio — Turn any book into a cinematic AI series" />
    <meta name="twitter:description" content="From book text to a full 7-episode cinematic production: characters, storyboards, AI-generated images, video and voice." />
    <meta name="twitter:image"       content="/og-image.png" />
    <meta name="twitter:image:alt"   content="BookFilm Studio — cinematic AI video series generator" />

    <!-- Google Fonts — loaded from google CDN (cached by service worker via vite-plugin-pwa).
         To fully eliminate the Google Fonts privacy dependency, self-host the woff2 files under /fonts/
         and update this block to @font-face rules in index.css instead. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
