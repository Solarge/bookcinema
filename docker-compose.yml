# (removed obsolete `version` key — Compose V2 ignores it)

# MongoDB → MongoDB Atlas (cloud)
# Redis  → Upstash (recommended cloud) OR secured local Redis below
# Set REDIS_URL in server/.env.server to switch between them:
#   Upstash: REDIS_URL=rediss://default:<token>@<host>.upstash.io:6380
#   Local:   REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379

services:

  # ── Redis (local secured — only used if not using Upstash) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: bookfilm-redis
    restart: unless-stopped
    user: "999:999"           # run as non-root (redis user in alpine image)
    read_only: true           # read-only filesystem
    tmpfs:
      - /tmp                  # allow temp writes only in tmpfs
    ports:
      # DO NOT expose 6379 to host in production — remove this line
      # Only uncomment for local dev
      - '127.0.0.1:6379:6379'   # bind to loopback only, not 0.0.0.0
    # Use command-line flag so the password is sourced from the REDIS_PASSWORD env var
    # (redis.conf cannot interpolate environment variables directly).
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env (must match the password in REDIS_URL)}
      --bind 0.0.0.0
      --protected-mode yes
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
      --rename-command SLAVEOF ""
      --rename-command REPLICAOF ""
      --rename-command SHUTDOWN SHUTDOWN_BOOKFILM
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
      --maxclients 100
      --tcp-keepalive 300
      --timeout 300
    volumes:
      - redis_data:/data
    networks:
      - bookfilm
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BookFilm API Server ──────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: bookfilm-server
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - server/.env.server
    environment:
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bookfilm
    security_opt:
      - no-new-privileges:true  # prevent privilege escalation
    cap_drop:
      - ALL                     # drop all Linux capabilities
    cap_add:
      - NET_BIND_SERVICE        # only allow binding to ports

  # ── BullMQ Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: bookfilm-worker
    restart: unless-stopped
    command: ["node", "worker/index.js"]
    env_file:
      - server/.env.server
    environment:
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bookfilm
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  redis_data:

networks:
  bookfilm:
    driver: bridge
    internal: false    # set to true in prod if server has its own outbound route
